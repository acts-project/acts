---
schema_version: 1
options:
  getSyntax: True
  exposePODMembers: False
  includeSubfolder: True

components:


    ActsPodioEdm::Surface:
      Members:
        - int surfaceType
        - int boundsType
        - uint64_t geometryId
        - uint64_t identifier
        - std::array<double, 10> boundValues
        - uint32_t boundValuesSize
        - std::array<double, 16> transform

    ActsPodioEdm::TrackInfo:
      Members:
        - std::array<double, 6> parameters
        - std::array<double, 36> covariance // local covariance
        - uint32_t tipIndex // index of the outermost track state
        - uint32_t stemIndex // index of the innermost track state
        - unsigned int nMeasurements // number of measurements
        - unsigned int nHoles // number of holes
        - float chi2 // chi squared of the track
        - unsigned int ndf // number of degrees of freedom
        - unsigned int nOutliers // number of outliers
        - unsigned int nSharedHits // number of shared hits

    ActsPodioEdm::TrackStateInfo:
      Members:
        - uint32_t previous
        - uint32_t next

        - uint32_t ipredicted;
        - uint32_t ifiltered;
        - uint32_t ismoothed;

        - std::array<double, 6> measurement
        - std::array<double, 36> measurementCovariance
        - uint32_t measdim;

        - uint32_t ijacobian
        - uint64_t projector
        - bool hasProjector

        - float chi2
        - double pathLength
        - uint64_t typeFlags

        - uint64_t uncalibratedIdentifier

    ActsPodioEdm::BoundParametersInfo:
      Members:
        - std::array<double, 6> values
        - std::array<double, 36> covariance

    ActsPodioEdm::JacobianInfo:
      Members:
        - std::array<double, 36> values

    ActsPodioEdm::ParticleHypothesis:
      Members:
        - uint32_t absPdg
        - float mass
        - float absQ

datatypes:
  ActsPodioEdm::Track:
    Description: "Reconstructed track"
    Author : "Paul Gessinger, CERN"
    Members:
      - ActsPodioEdm::TrackInfo data // local parameters and covariance

      - ActsPodioEdm::Surface referenceSurface // reference surface

      - ActsPodioEdm::ParticleHypothesis particleHypothesis // particle hypothesis

  ActsPodioEdm::TrackState:
    Description: "Local state on a track"
    Author : "Paul Gessinger, CERN"
    Members:
      - ActsPodioEdm::TrackStateInfo data // local information
      - ActsPodioEdm::Surface referenceSurface // reference surface

  ActsPodioEdm::BoundParameters:
    Description: "Local track parameters"
    Author : "Paul Gessinger, CERN"
    Members:
      - ActsPodioEdm::BoundParametersInfo data // parameter information

  ActsPodioEdm::Jacobian:
    Description: "Jacobian matrix from the previous track state to the current one"
    Author : "Paul Gessinger, CERN"
    Members:
      - ActsPodioEdm::JacobianInfo data // the jacobian data


  ActsPodioEdm::Measurement:
    Description: "Local representation of a measurement"
    Author : "Paul Gessinger, CERN"

    Members:
      - std::uint64_t geometryId // the associated surface identifier
    VectorMembers:
      - std::uint16_t indices // the local indices
      - double parameterValues // the measurement parameter value
      - double covarianceValues // the measurement covairance value

    # @TODO: Should map back to the simhit(s) that created it

    OneToOneRelations:
      - edm4hep::SimTrackerHit simHit // the associated simulated hit

    ExtraCode:
      declaration: |
        std::size_t size() const {
          return indices_size();
        }

  ActsPodioEdm::TrackerHitLocal:
    Description: "Sensor-local tracker hit"
    Author: "Paul Gessinger, CERN"
    Members:
    # These are chosen to be compatible with the `edm4hep::TrackerHit` interface
    # (https://github.com/key4hep/EDM4hep/blob/c877c7fadf412db3c1126e7b410d8074a78014f2/edm4hep.yaml#L652-L666V)
    # to allow for potential upstreaming
    - uint64_t cellID                    // ID of the sensor that created this hit
    - int32_t type                       // type of raw data hit, use depends on writer
    - int32_t quality                    // quality bit flag of the hit
    - float time [ns]                    // time of the hit (depends on measurement type)
    - float eDep [GeV]                   // energy deposited on the hit (optional)
    - float eDepError [GeV]              // error measured on EDep (optional)
    - edm4hep::Vector3d position [mm]    // global hit position (depends on measurement type)

    VectorMembers:
      - float measurement // Entries in the measurement value vector
      - float covariance // Entries in the measurement covariance vector. Order is column major

    ExtraCode:
      includes: "#include <ActsPodioEdm/detail/SubspaceIndexHelpers.hpp>"
      declaration: |
        /// Number of active subspace dimensions
        /// @return The number of active subspace dimensions
        std::size_t getSize() const {
          return getSubspaceIndices().size();
        }


        /// Get the value for the passed subspace index
        /// @param valueIndex The index of the value
        /// @return The value
        float getValue(std::size_t valueIndex) const {
          const auto dim = getSize();
          auto values = getMeasurement();
          if (values.size() != dim) {
            throw std::runtime_error("Measurement vector size mismatch");
          }
          const auto offset =
              ActsPodioEdm::detail::measurementVectorOffset(
                  valueIndex, dim);
          return values[offset];
        }
        
        /// Get covariance value for the two passed matrix indices
        /// @param indexI The first index
        /// @param indexJ The second index
        /// @return The covariance value
        float getCov(std::size_t indexI, std::size_t indexJ) const {
          auto cov = getCovariance();
          const auto dim = getSize();
          const auto offset =
              ActsPodioEdm::detail::covarianceVectorOffset(
                  indexI, indexJ, dim, cov.size());
          return cov[offset];
        }

        /// Decode and return the subspace indices stored in the type field
        /// @return The subspace indices
        std::vector<std::uint8_t> getSubspaceIndices() const {
          return ActsPodioEdm::detail::decodeIndices(
              static_cast<std::uint32_t>(getType()));
        }

    MutableExtraCode:
      includes: "#include <ActsPodioEdm/detail/SubspaceIndexHelpers.hpp>"
      declaration: |
        /// Set the value for the passed measurement-vector index
        /// @param val The value to set
        /// @param valueIndex The index of the value
        void setValue(float val, std::size_t valueIndex) {
          const auto dim = getSize();
          if (m_obj->m_measurement == nullptr || m_obj->m_measurement->size() != dim) {
            throw std::runtime_error("Measurement vector not initialized - call setSubspaceIndices first");
          }
          const auto offset =
              ActsPodioEdm::detail::measurementVectorOffset(
                  valueIndex, dim);
          (*m_obj->m_measurement)[offset] = val;
        }

        /// Set the covariance value for the two passed matrix indices
        /// @param val The value to set
        /// @param indexI The first index
        /// @param indexJ The second index
        void setCov(float val, std::size_t indexI, std::size_t indexJ) {
          const auto dim = getSize();
          if (m_obj->m_covariance == nullptr || m_obj->m_covariance->size() != dim * dim) {
            throw std::runtime_error("Covariance vector not initialized - call setSubspaceIndices first");
          }
          const auto offset =
              ActsPodioEdm::detail::covarianceVectorOffset(
                  indexI, indexJ, dim, m_obj->m_covariance->size());
          (*m_obj->m_covariance)[offset] = val;
        }

        /// Encode and store subspace indices into the type field
        /// @param indices The subspace indices
        /// @note This will initialize the measurement and covariance vectors if they are not already initialized
        void setSubspaceIndices(std::span<const std::uint8_t> indices) {
          setType(static_cast<std::int32_t>(
              ActsPodioEdm::detail::encodeIndices(indices)));
          if (m_obj->m_measurement == nullptr) {
            m_obj->m_measurement = new std::vector<float>{};
          }
          if (m_obj->m_covariance == nullptr) {
            m_obj->m_covariance = new std::vector<float>{};
          }
          m_obj->m_measurement->assign(indices.size(), 0.f);
          m_obj->m_covariance->assign(indices.size() * indices.size(), 0.f);
        }


