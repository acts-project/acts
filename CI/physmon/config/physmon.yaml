  - title: "AMVF grid time | trackfinding | ttbar with 200 pileup | default seeding"
    current: trackfinding_ttbar_pu200/performance_vertexing_amvf_grid_time_hist.root
    mode: fullchains
    plot:
      from: trackfinding_ttbar_pu200/performance_vertexing_amvf_grid_time.root
      tree: vertexing
      config: vertexing_ttbar_pu200.yml

  # ---- gx2f vs kf (special: reference is generated, not in reference/) ---
  - title: "Comparison - Truth tracking (GX2F vs KF)"
    current: trackfitting_gx2f_vs_kf/performance_trackfitting_gx2f.root
    reference: trackfitting_gx2f_vs_kf/performance_trackfitting_kf.root
    reference_in: outdir
    config: info_only.yml
    label_reference: KF
    label_monitored: GX2F
    mode: gx2f_vs_kf
