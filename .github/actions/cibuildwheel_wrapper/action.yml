name: 'cibuildwheel_wrapper'
description: 'Build ACTS Python wheels via CI/cibuildwheel.sh, with ccache support'

inputs:
  package-dir:
    description: 'Directory containing the package to build (passed to cibuildwheel)'
    required: false
    default: '.'
  cibw-build:
    description: >-
      Value for CIBW_BUILD, narrowing which Python version(s) to build. Leave
      empty to build every version allowed by `requires-python` in pyproject.toml.
    required: false
    default: ''
  github-token:
    description: 'GitHub token forwarded to the build environment (used by setup.sh)'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

    - name: Restore ccache
      id: ccache-restore
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache-${{ runner.os }}-${{ github.job }}-${{ env.CCACHE_KEY_SUFFIX }}-${{ github.sha }}
        restore-keys: |
          ccache-${{ runner.os }}-${{ github.job }}-${{ env.CCACHE_KEY_SUFFIX }}-

    - name: Build wheels
      shell: bash
      run: "${PACKAGE_DIR}/CI/cibuildwheel.sh ${PACKAGE_DIR}"
      env:
        PACKAGE_DIR: ${{ inputs.package-dir }}
        CIBW_BUILD: ${{ inputs.cibw-build }}
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Save ccache
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      if: always()
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ${{ steps.ccache-restore.outputs.cache-primary-key }}
