name: 'Dependencies'
description: 'Install dependencies from lockfile'

inputs:
  compiler:
    description: 'Compiler to use'
    required: false
    default: ''
  GITHUB_TOKEN:
    description: 'Secrets to pass to the action'
    required: false
    default: ''
  spack_version:
    description: 'Version of Spack to use'
    required: false
    default: '426ab4d83b93df5c1ace836bd12d514ab2074b77'
  spack_repo_version:
    description: 'Spack builtin packages repo commit (git SHA) to pin'
    required: false
    default: '1356a203eba53c3401e2be4e92d93432fe780190'
  DEPENDENCY_TAG:
    description: 'Dependency tag to pull from'
    required: false
    default: 'v23.2.0'
  full_install:
    description: 'Whether to do a full dependency installation including Geant4 datasets and Python packages'
    required: false
    default: 'false'
  cxx_std:
    description: 'C++ standard for lockfile selection (e.g. 20, 23). Defaults to 20.'
    required: false
    default: '20'
  env_file:
    description: 'Where to generate the environment file'
    required: true


runs:
  using: 'composite'
  steps:
    - name: Setup Python version
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.12"

    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

    - name: Prerequisites
      if: startsWith(runner.os, 'macos')
      shell: bash
      run: |
        brew install ninja ccache

    - name: Restore cache
      id: cache-restore
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: spack_cache
        key: spack-r4-${{ inputs.spack_version }}-${{ inputs.spack_repo_version }}-${{ hashFiles('CI/dependencies/setup_spack.sh') }}

    - name: Extract cached Spack
      if: steps.cache-restore.outputs.cache-hit == 'true'
      shell: bash
      run: |
        mv spack_cache/spack .
        mv spack_cache/.spack ~

    - name: Setup Spack from scratch
      if: steps.cache-restore.outputs.cache-hit != 'true'
      shell: bash
      env:
        SPACK_VERSION: ${{ inputs.spack_version }}
      run: |
        CI/dependencies/setup_spack.sh ${PWD}/spack
        spack/bin/spack list > /dev/null
        rm -rf spack/.git
        mkdir spack_cache
        cp -RP spack spack_cache/
        cp -RP ~/.spack spack_cache/

    - name: Save cache
      if: steps.cache-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: |
          spack_cache
        key: ${{ steps.cache-restore.outputs.cache-primary-key }}

    - name: Install dependencies
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
        SPACK_REPO_VERSION: ${{ inputs.spack_repo_version }}
        DEPENDENCY_TAG: ${{ inputs.DEPENDENCY_TAG }}
        CXXSTD: ${{ inputs.cxx_std }}
        ENV_FILE: ${{ inputs.env_file }}
        FULL_INSTALL: ${{ inputs.full_install }}
        COMPILER: ${{ inputs.compiler }}
      run: |
        args="-e $ENV_FILE"
        if [ "$FULL_INSTALL" == "true" ]; then
          echo "Full install"
          args="${args} -f"
        fi
        if [ -n "$COMPILER" ]; then
          echo "With compiler"
          args="${args} -c $COMPILER"
        fi

        CI/dependencies/setup.sh $args
