version: 2
updates:
  - package-ecosystem: "github-actions" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "01:23"
      timezone: "Europe/Zurich"
    cooldown:
      default-days: 7

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "01:23"
      timezone: "Europe/Zurich"
    cooldown:
      default-days: 7
