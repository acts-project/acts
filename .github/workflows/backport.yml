name: Backport

on:
  # pull_request_target is required to backport merged PRs from forks; the job
  # only runs on merged PRs and does not check out or execute untrusted PR code.
  pull_request_target: # zizmor: ignore[dangerous-triggers]
    types:
      - closed
      - labeled

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backport:
    name: Backport
    runs-on: ubuntu-latest
    # Only react to merged PRs for security reasons.
    # See https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#pull_request_target.
    if: >
      github.event.pull_request.merged
      && (
        github.event.action == 'closed'
        || (
          github.event.action == 'labeled'
          && contains(github.event.label.name, 'backport')
        )
      )
    steps:
      - uses: tibdex/backport@9565281eda0731b1d20c4025c43339fb0a23812e # v2.0.4
        with:
          github_token: ${{ secrets.BACKPORT_TOKEN }}
          title_template: "<%= title %> [backport #<%= number %> to <%= base %>]"
          labels_template: '["backport"]'
          body_template: >
            Backport <%= mergeCommitSha %> from #<%= number %>.

            ---

            <%= body %>
