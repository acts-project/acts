name: Update Pip Requirements

on:
  workflow_dispatch: # Allow running on-demand
  schedule:
    # Runs every Sunday at 1:23 UTC
    - cron: '23 1 * * 0'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-pip-requirements:
    # This action checks all monitored (specified in `folder_list` below) requirements.in
    # files and generates a new requirements.txt file with pip-compile. If any
    # requirements changed, a PR is created with the changes.

    # Abort scheduled workflows dispatched by forks
    if: github.event_name != 'schedule' || github.repository == 'acts-project/acts'

    runs-on: ubuntu-slim
    env:
      # This branch will receive updates each time the workflow runs
      # It doesn't matter if it's deleted when merged, it'll be re-created
      BRANCH_NAME: auto-dependency-upgrades
    steps:
      # persisted credentials are required for the push step below
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Lowest Python version the lockfiles must install on, taken from
      # `requires-python` in pyproject.toml so it is defined in exactly one place
      - name: Determine supported Python floor
        id: floor
        run: echo "version=$(CI/supported_python_versions.py --floor)" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ steps.floor.outputs.version }}

      - name: Install uv
        run: |
          python -m pip install -U pip
          python -m pip install -U uv

      - name: Compile all requirements.txt
        env:
          PYTHON_VERSION: ${{ steps.floor.outputs.version }}
        run: |
          # Update this list after adding/removing requirements-files
          folder_list=(
            CI/clang_tidy
            CI/fpe_masks
            codegen
            docs/old
            Python/Examples/tests
            Examples/Scripts
          )
          for folder in "${folder_list[@]}"; do
            output_txt="${folder}/requirements.txt"
            input_in="${folder}/requirements.in"
            input_toml="${folder}/pyproject.toml"

            rm "$output_txt"

            if [[ -f "$input_toml" ]]; then
              uv pip compile --universal --python-version "$PYTHON_VERSION" "$input_toml" -o "$output_txt"
            elif [[ -f "$input_in" ]]; then
              uv pip compile --universal --python-version "$PYTHON_VERSION" "$input_in" -o "$output_txt"
            else
              echo "No requirements.in or pyproject.toml in $folder."
            fi

          done

      - name: Detect changes
        id: changes
        run:
          # This output boolean tells us if the dependencies have actually changed
          echo "count=$(git status --porcelain=v1 2>/dev/null | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit & push changes
        # Only push if changes exist
        if: steps.changes.outputs.count > 0
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "Weekly Update: Regenerate requirements.txt"
          git push -f origin "$REF_NAME:$BRANCH_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}

      - name: Open pull request if needed
        if: steps.changes.outputs.count > 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Only open a PR if the branch is not attached to an existing one
        run: |
          PR=$(gh pr list --head $BRANCH_NAME --json number -q '.[0].number')
          if [ -z $PR ]; then
            gh pr create \
            --head "$BRANCH_NAME" \
            --title "chore: automated python requirements upgrades" \
            --body "Full log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            echo "Pull request already exists, won't create a new one."
          fi
