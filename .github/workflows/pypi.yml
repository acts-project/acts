name: PyPI

# Nightly builds on schedule; release builds triggered manually via workflow_dispatch
on:
  schedule:
    - cron: '5 3 * * *'
  workflow_dispatch:
    inputs:
      acts_ref:
        description: 'Acts ref to build (e.g. v39.3.0) — leave empty to trigger a nightly build'
        required: false
        type: string

env:
  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_KEY_SUFFIX: r2

permissions: {}

jobs:
  # Prepare step: get unique time-stamp and checkout of the repo (otherwise main
  # could get updated during matrix jobs and code could differ between builds)
  prepare:
    runs-on: ubuntu-latest
    permissions: {}
    if: github.repository == 'acts-project/acts' || github.event_name != 'schedule'
    steps:
      - name: Set build version
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.acts_ref == ''
        run: echo "dev$(date +%Y%m%d%H%M%S)" > build_version.txt

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.acts_ref == ''
        with:
          name: build-version
          path: build_version.txt

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.acts_ref || 'main' }}
          path: acts
          persist-credentials: false

      - name: Package source as tarball
        run: tar czf acts-source.tar.gz acts/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: acts-source
          path: acts-source.tar.gz

  build_wheels:
    needs: prepare
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions: {}
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        os:
         - ubuntu-latest
        # - ubuntu-24.04-arm
        # - macos-15-intel
         - macos-latest

    steps:
      - name: Download source tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: acts-source

      - name: Extract source tarball
        run: tar xzf acts-source.tar.gz

      - name: Download build version
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.acts_ref == ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-version

      - name: print build version
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.acts_ref == ''
        run: cat build_version.txt


      - name: Build wheels
        uses: ./acts/.github/actions/cibuildwheel_wrapper
        with:
          package-dir: acts
          cibw-build: "cp311-* cp310-* cp312-* cp313-* cp314-*"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Patch version to dev version
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.acts_ref == ''
        run: |
          PATCHED_VERSION="$(cat acts/version_number).$(cat build_version.txt)"
          echo "Patch to version $PATCHED_VERSION"
          python3 -m pip install change-wheel-version==0.6.0
          cd wheelhouse
          for f in ./*.whl; do
            change_wheel_version $f --version $PATCHED_VERSION --delete-old-wheel
          done

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl


  upload_pypi_test:
    needs: build_wheels
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.acts_ref == ''
    environment:
      name: testpypi
      url: https://test.pypi.org/project/pyacts
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
    - name: Get wheels
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: cibw-*
        path: dist
        merge-multiple: true

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      with:
        packages-dir: dist
        repository-url: https://test.pypi.org/legacy/
        skip-existing: true
        verbose: true

  upload_pypi:
    needs: build_wheels
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.acts_ref != ''
    environment:
      name: pypi
      url: https://pypi.org/project/pyacts
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
    - name: Get wheels
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: cibw-*
        path: dist
        merge-multiple: true

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      with:
        packages-dir: dist
        skip-existing: true
        verbose: true
